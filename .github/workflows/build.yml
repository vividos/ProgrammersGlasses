# Build for the ProgrammersGlasses executable

name: Build ProgrammersGlasses

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Bootstrap vcpkg
      shell: cmd
      run: |
        cd %VCPKG_INSTALLATION_ROOT%
        git pull > nul
        call .\bootstrap-vcpkg.bat -disableMetrics
        vcpkg integrate install

    - name: Build solution
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\Common7\Tools\VsDevCmd.bat"
        msbuild /m ^
          /p:Configuration=Release ^
          src\ProgrammersGlasses.slnx

    - name: Publish build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ProgrammersGlasses.exe file
        path: bin\Release\ProgrammersGlasses.exe
